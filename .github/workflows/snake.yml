name: generate snake animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3.5.0
        with:
          github_user_name: ahan-jain
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?color_snake=8B5CF6&color_dots_0=161B22&color_dots_1=4C2A85&color_dots_2=6D28D9&color_dots_3=8B5CF6&color_dots_4=A78BFA
            color_snake=A855F7
            
      - name: push svg to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
